# KurdMap — Docker Compose (Podman-compatible)
#
# Run all commands from this folder (docker/):
#   cd docker && podman compose up -d --build
#
# Development:
#   podman compose up -d --build     — auto-loads docker-compose.override.yml (dev ports)
#   podman compose down              — Stop all services
#   podman compose logs -f api       — Follow API logs
#
# Production:
#   podman compose -f docker-compose.yml -f docker-compose.prod.yml up -d --no-build
#   (override.yml is NOT loaded when -f is explicit)
#
# Network Architecture (Enterprise):
#   frontend-net (bridge)     — API, Admin, Frontend exposed to host (127.0.0.1)
#   backend-net  (internal)   — API ↔ PostgreSQL ↔ Redis only, NO internet access
#   API bridges both networks; DB/Redis are completely isolated.

# Stable project name so containers/volumes survive folder moves
name: kurdmap

services:
  # ─── PostgreSQL ───────────────────────────────────────────
  postgres:
    image: docker.io/library/postgres:17-alpine
    container_name: kurdmap-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-kurdmap_dev}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - backend-net
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER:-postgres}", "-d", "${POSTGRES_DB:-kurdmap_dev}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ─── Redis ────────────────────────────────────────────────
  redis:
    image: docker.io/library/redis:7-alpine
    container_name: kurdmap-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-changeme}
      --rename-command FLUSHDB ""
      --rename-command FLUSHALL ""
      --rename-command DEBUG ""
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redisdata:/data
    networks:
      - backend-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── KurdMap API (.NET 10) ────────────────────────────────
  api:
    image: ${API_IMAGE:-kurdmap-api:local}
    container_name: kurdmap-api
    restart: unless-stopped
    ports:
      - "127.0.0.1:${API_PORT:-8080}:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: ${ENVIRONMENT:-Production}
      # HostFiltering: the SSR frontend proxies API calls with an internal Host
      # header (e.g. "api"). Include the internal service names plus localhost so
      # HostFiltering does not reject them with a 400. External traffic arrives via
      # Caddy with Host rewritten to localhost.
      AllowedHosts: ${API_ALLOWED_HOSTS:-localhost;api;kurdmap-api}
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=${POSTGRES_DB:-kurdmap_dev};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:?required}"
      ConnectionStrings__Redis: "redis:6379,password=${REDIS_PASSWORD:-changeme}"
      Jwt__Secret: ${JWT_SECRET:?JWT_SECRET is required - use openssl rand -base64 48}
      Jwt__Issuer: ${JWT_ISSUER:-KurdMap}
      Jwt__Audience: ${JWT_AUDIENCE:-KurdMapClient}
      Cors__AllowedOrigins__0: ${FRONTEND_URL:-http://localhost:4000}
      Cors__AllowedOrigins__1: ${ADMIN_URL:-http://localhost:4200}
      Cors__AllowedOrigins__2: "http://localhost:4200"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - frontend-net
      - backend-net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─── KurdMap Admin Panel (Angular 21 SPA — static assets only) ──────
  # No internal web server. Build artifacts are published to the
  # `admin-static` named volume; an external server (Caddy on host)
  # serves them.
  admin:
    image: ${ADMIN_IMAGE:-kurdmap-admin:local}
    container_name: kurdmap-admin
    restart: unless-stopped
    volumes:
      - admin-static:/dist
    healthcheck:
      test: ["CMD", "ls", "/dist/index.html"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - frontend-net
    depends_on:
      - api

  # ─── KurdMap Frontend (Angular SSR) ───────────────────────
  frontend:
    image: ${FRONTEND_IMAGE:-kurdmap-frontend:local}
    container_name: kurdmap-frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:${FRONTEND_PORT:-4000}:4000"
    environment:
      NODE_ENV: production
      API_URL: "http://api:8080"
      # Angular SSR SSRF protection: hostnames allowed in Host/X-Forwarded-Host.
      # 'localhost' is always allowed (baked into the build); add public domains here.
      NG_ALLOWED_HOSTS: ${FRONTEND_ALLOWED_HOSTS:-kurdmap.eu,www.kurdmap.eu}
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:4000').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - frontend-net
    depends_on:
      - api

# ─── Networks ─────────────────────────────────────────────
# Two-zone isolation: frontend (exposed) + backend (internal)
networks:
  frontend-net:
    driver: bridge
  backend-net:
    driver: bridge
    internal: true  # No internet access — DB/Redis completely isolated

volumes:
  pgdata:
  redisdata:
  admin-static:
