# KurdMap — Development Override (auto-loaded by `podman compose up`)
#
# This file is automatically merged when you run:
#   podman compose up -d --build
#
# It is NOT loaded with explicit -f flags (production):
#   podman compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Adds: dev ports, 0.0.0.0 binding, build contexts, debug environment

services:
  # Dev: expose DB/Redis ports for local tools (DBeaver, RedisInsight, etc.)
  postgres:
    ports:
      - "${POSTGRES_PORT:-55432}:5432"

  redis:
    ports:
      - "${REDIS_PORT:-56379}:6379"

  # Dev: build from local Dockerfiles. API/Frontend ports are inherited from the base
  # compose file (127.0.0.1 binding). NOTE: podman-compose merges port
  # lists additively, so do NOT redeclare them here.
  api:
    build:
      context: ..
      dockerfile: docker/api.Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development

  admin:
    build:
      context: ..
      dockerfile: docker/admin.Dockerfile
      target: dev-runtime
    ports:
      - "127.0.0.1:${ADMIN_DEV_PORT:-4201}:8081"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8081/"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

  frontend:
    build:
      context: ..
      dockerfile: docker/frontend.Dockerfile
