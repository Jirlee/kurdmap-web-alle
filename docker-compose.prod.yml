# KurdMap — Production Overlay (Podman Enterprise)
# Usage: podman compose -f docker-compose.yml -f docker-compose.prod.yml up -d --no-build
#
# Requires .env file with all secrets set. See .env.example
# Compatible with podman-compose (Python) — no !override tags used.
#
# Security Architecture (Defense-in-Depth):
#   Layer 0: Rootless Podman (no root daemon)
#   Layer 1: Network isolation (frontend-net bridge + backend-net internal)
#   Layer 2: Read-only filesystem + tmpfs
#   Layer 3: Dropped capabilities (--cap-drop ALL)
#   Layer 4: no-new-privileges (no setuid/setgid escalation)
#   Layer 5: Resource limits (memory, cpu, pids)
#   Layer 6: 127.0.0.1 binding (only Caddy on host can reach services)
#   Layer 7: Backend-net is --internal (DB/Redis have ZERO internet access)

services:
  # ─── PostgreSQL (backend-net ONLY — no internet, no host exposure) ──
  postgres:
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256"
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '2.0'
        reservations:
          memory: 256m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - FOWNER
      - DAC_OVERRIDE
    pids_limit: 256
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ─── Redis (backend-net ONLY — no internet, no host exposure) ──
  # Volume redisdata:/data from base is writable even with read_only: true
  # user: "999" runs as redis user directly, bypassing gosu (no SETUID needed)
  redis:
    user: "999:999"
    read_only: true
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: '0.5'
        reservations:
          memory: 64m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 64
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  # ─── API (bridges frontend-net + backend-net) ──
  api:
    image: ghcr.io/${GHCR_USERNAME}/kurdmap-api:latest
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
      ConnectionStrings__Redis: "redis:6379,password=${REDIS_PASSWORD}"
      Jwt__Secret: ${JWT_SECRET}
      Jwt__Issuer: ${JWT_ISSUER}
      Jwt__Audience: ${JWT_AUDIENCE}
      Cors__AllowedOrigins__0: ${FRONTEND_URL}
      Cors__AllowedOrigins__1: ${ADMIN_URL}
      AllowedHosts: "${API_DOMAIN:-api.kurdmap.de}"
      Serilog__MinimumLevel__Default: "Warning"
    read_only: true
    tmpfs:
      - /tmp:size=100m,noexec,nosuid
      - /app/Logs:size=50m,noexec,nosuid
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '2.0'
        reservations:
          memory: 256m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    pids_limit: 256
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  # ─── Admin Panel (frontend-net ONLY) ──
  admin:
    image: ghcr.io/${GHCR_USERNAME}/kurdmap-admin:latest
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid
      - /var/cache/nginx:noexec,nosuid,uid=101,gid=101
      - /var/run:noexec,nosuid,uid=101,gid=101
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: '0.5'
        reservations:
          memory: 64m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    pids_limit: 64
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  # ─── Frontend SSR (frontend-net ONLY) ──
  frontend:
    image: ghcr.io/${GHCR_USERNAME}/kurdmap-frontend:latest
    read_only: true
    tmpfs:
      - /tmp:size=100m,noexec,nosuid
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: '1.0'
        reservations:
          memory: 128m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    pids_limit: 128
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ─── NOTE: Caddy runs on the HOST (not in Docker) ────────
  # The Hetzner server hosts multiple websites sharing ports 80/443.
  # Caddy is installed system-wide: sudo dnf install caddy
  # Import KurdMap config in /etc/caddy/Caddyfile:
  #   import /opt/kurdmap/docker/Caddyfile
  # After changes: sudo systemctl reload caddy

# Networks and volumes are defined in docker-compose.yml (base) and inherited here.
# frontend-net: bridge (API, Admin, Frontend — host-reachable via 127.0.0.1)
# backend-net:  internal (API ↔ PostgreSQL ↔ Redis — ZERO internet access)
