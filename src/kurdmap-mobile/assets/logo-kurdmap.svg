<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- Background gradient: deep navy to dark teal -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0c1929"/>
      <stop offset="40%" stop-color="#0f2a3e"/>
      <stop offset="100%" stop-color="#0a3040"/>
    </linearGradient>

    <!-- Sun glow -->
    <radialGradient id="sunAura" cx="50%" cy="38%" r="40%">
      <stop offset="0%" stop-color="#FFD700" stop-opacity="0.18"/>
      <stop offset="70%" stop-color="#FFD700" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="#FFD700" stop-opacity="0"/>
    </radialGradient>

    <!-- Pin gradient: emerald green -->
    <linearGradient id="pin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#34D399"/>
      <stop offset="50%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>

    <!-- Ring: tricolor as subtle aesthetic -->
    <linearGradient id="ring" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#333"/>
      <stop offset="40%" stop-color="#D4372C"/>
      <stop offset="100%" stop-color="#FFB829"/>
    </linearGradient>

    <filter id="pinShadow">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000" flood-opacity="0.35"/>
    </filter>

    <filter id="sunGlow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Full background -->
  <rect width="1024" height="1024" rx="200" fill="url(#bg)"/>

  <!-- Very subtle sun aura -->
  <circle cx="512" cy="380" r="400" fill="url(#sunAura)"/>

  <!-- 21 faint decorative rays (Kurdish sun tribute) -->
  <g opacity="0.06" stroke="#FFD700" stroke-width="2" fill="none" transform="translate(512,380)">
    <line x1="0" y1="0" x2="0" y2="-350"/>
    <line x1="0" y1="0" x2="105" y2="-334"/>
    <line x1="0" y1="0" x2="205" y2="-286"/>
    <line x1="0" y1="0" x2="286" y2="-205"/>
    <line x1="0" y1="0" x2="334" y2="-105"/>
    <line x1="0" y1="0" x2="350" y2="0"/>
    <line x1="0" y1="0" x2="334" y2="105"/>
    <line x1="0" y1="0" x2="286" y2="205"/>
    <line x1="0" y1="0" x2="205" y2="286"/>
    <line x1="0" y1="0" x2="105" y2="334"/>
    <line x1="0" y1="0" x2="0" y2="350"/>
    <line x1="0" y1="0" x2="-105" y2="334"/>
    <line x1="0" y1="0" x2="-205" y2="286"/>
    <line x1="0" y1="0" x2="-286" y2="205"/>
    <line x1="0" y1="0" x2="-334" y2="105"/>
    <line x1="0" y1="0" x2="-350" y2="0"/>
    <line x1="0" y1="0" x2="-334" y2="-105"/>
    <line x1="0" y1="0" x2="-286" y2="-205"/>
    <line x1="0" y1="0" x2="-205" y2="-286"/>
    <line x1="0" y1="0" x2="-105" y2="-334"/>
    <line x1="0" y1="0" x2="-52" y2="-346"/>
  </g>

  <!-- Outer decorative ring -->
  <circle cx="512" cy="512" r="440" fill="none" stroke="url(#ring)" stroke-width="4" opacity="0.15"/>

  <!-- Map Pin — centered & prominent -->
  <g filter="url(#pinShadow)" transform="translate(512, 400)">
    <!-- Pin body -->
    <path d="M0-240 C-110-240 -200-150 -200-60 C-200 60 0 200 0 200 C0 200 200 60 200-60 C200-150 110-240 0-240Z"
          fill="url(#pin)"/>

    <!-- Glass highlight on pin -->
    <path d="M-10-225 C-90-225 -170-150 -170-65 C-170-150 -90-225 -10-225Z"
          fill="white" opacity="0.12"/>

    <!-- Dark inner circle -->
    <circle cx="0" cy="-70" r="76" fill="#0c1929" opacity="0.9"/>

    <!-- Golden sun compass -->
    <g transform="translate(0, -70)" filter="url(#sunGlow)">
      <!-- Main disc -->
      <circle cx="0" cy="0" r="44" fill="#FFD700" opacity="0.9"/>

      <!-- 8 major rays -->
      <g stroke="#FFD700" stroke-width="5" stroke-linecap="round" opacity="0.85">
        <line x1="0" y1="-50" x2="0" y2="-64"/>
        <line x1="36" y1="-36" x2="46" y2="-46"/>
        <line x1="50" y1="0" x2="64" y2="0"/>
        <line x1="36" y1="36" x2="46" y2="46"/>
        <line x1="0" y1="50" x2="0" y2="64"/>
        <line x1="-36" y1="36" x2="-46" y2="46"/>
        <line x1="-50" y1="0" x2="-64" y2="0"/>
        <line x1="-36" y1="-36" x2="-46" y2="-46"/>
      </g>

      <!-- 8 minor rays -->
      <g stroke="#FFD700" stroke-width="3" stroke-linecap="round" opacity="0.45">
        <line x1="20" y1="-46" x2="26" y2="-58"/>
        <line x1="46" y1="-20" x2="58" y2="-26"/>
        <line x1="46" y1="20" x2="58" y2="26"/>
        <line x1="20" y1="46" x2="26" y2="58"/>
        <line x1="-20" y1="46" x2="-26" y2="58"/>
        <line x1="-46" y1="20" x2="-58" y2="26"/>
        <line x1="-46" y1="-20" x2="-58" y2="-26"/>
        <line x1="-20" y1="-46" x2="-26" y2="-58"/>
      </g>

      <!-- Inner circles -->
      <circle cx="0" cy="0" r="20" fill="#F59E0B" opacity="0.5"/>
      <circle cx="0" cy="0" r="10" fill="#FBBF24" opacity="0.7"/>
    </g>
  </g>

  <!-- Text: KURDMAP -->
  <text x="512" y="720" text-anchor="middle" font-family="'Segoe UI', 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
        font-size="88" font-weight="900" fill="white" letter-spacing="8" opacity="0.95">
    KURDMAP
  </text>

  <!-- Subtle three stripes (German flag abstracted as design element) -->
  <g opacity="0.1">
    <rect x="340" y="760" width="344" height="3" rx="1.5" fill="#333"/>
    <rect x="360" y="770" width="304" height="3" rx="1.5" fill="#D4372C"/>
    <rect x="380" y="780" width="264" height="3" rx="1.5" fill="#FFB829"/>
  </g>

  <!-- Tagline -->
  <text x="512" y="830" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="28" fill="#94a3b8" letter-spacing="10" opacity="0.5">
    DISCOVER LOCAL
  </text>
</svg>
