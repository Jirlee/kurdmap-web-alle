<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="pin" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0" stop-color="#4ADE80"/>
      <stop offset="0.5" stop-color="#16A34A"/>
      <stop offset="1" stop-color="#14532D"/>
    </linearGradient>
    <radialGradient id="well" cx="0.5" cy="0.45" r="0.6">
      <stop offset="0" stop-color="#ECFDF5"/>
      <stop offset="1" stop-color="#BBF7D0"/>
    </radialGradient>
    <radialGradient id="sun" cx="0.42" cy="0.38" r="0.7">
      <stop offset="0" stop-color="#FEF9C3"/>
      <stop offset="0.45" stop-color="#FDE047"/>
      <stop offset="1" stop-color="#FACC15"/>
    </radialGradient>
    <linearGradient id="ray" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FDE047"/>
      <stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>
    <filter id="pinShadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="22" stdDeviation="30" flood-color="#052E16" flood-opacity="0.32"/>
    </filter>
