<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- Sun body gradient -->
    <radialGradient id="sunBodyA" cx="45%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#FDE68A"/>
      <stop offset="40%" stop-color="#FBBF24"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </radialGradient>

    <!-- Pin gradient: emerald -->
    <linearGradient id="pinGradA" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34D399"/>
      <stop offset="50%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>

    <!-- Sun glow -->
    <radialGradient id="sunGlowA" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FBBF24" stop-opacity="0.2"/>
      <stop offset="70%" stop-color="#F59E0B" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#F59E0B" stop-opacity="0"/>
    </radialGradient>

    <filter id="dropShadowA" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="14" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Transparent background — Android provides backgroundColor -->

  <!-- Subtle sun glow behind pin -->
  <circle cx="512" cy="370" r="360" fill="url(#sunGlowA)"/>

  <!-- Faint 21 rays emanating outward -->
  <g transform="translate(512, 370)" opacity="0.12">
    <g fill="#FBBF24">
      <polygon points="0,-340 10,-200 -10,-200" transform="rotate(0)"/>
      <polygon points="0,-340 10,-200 -10,-200" transform="rotate(17.14)"/>
      <polygon points="0,-340 10,-200 -10,-200" transform="rotate(34.28)"/>
      <polygon points="0,-340 10,-200 -10,-200" transform="rotate(51.43)"/>
      <polygon points="0,-340 10,-200 -10,-200" transform="rotate(68.57)"/>
      <polygon points="0,-340 10,-200 -10,-200" transform="rotate(85.71)"/>
      <polygon points="0,-340 10,-200 -10,-200" transform="rotate(102.86)"/>
      <polygon points="0,-340 10,-200 -10,-200" transform="rotate(120)"/>
      <polygon points="0,-340 10,-200 -10,-200" transform="rotate(137.14)"/>
      <polygon points="0,-340 10,-200 -10,-200" transform="rotate(154.28)"/>
      <polygon points="0,-340 10,-200 -10,-200" transform="rotate(171.43)"/>
      <polygon points="0,-340 10,-200 -10,-200" transform="rotate(188.57)"/>
      <polygon points="0,-340 10,-200 -10,-200" transform="rotate(205.71)"/>
      <polygon points="0,-340 10,-200 -10,-200" transform="rotate(222.86)"/>
      <polygon points="0,-340 10,-200 -10,-200" transform="rotate(240)"/>
      <polygon points="0,-340 10,-200 -10,-200" transform="rotate(257.14)"/>
      <polygon points="0,-340 10,-200 -10,-200" transform="rotate(274.28)"/>
      <polygon points="0,-340 10,-200 -10,-200" transform="rotate(291.43)"/>
      <polygon points="0,-340 10,-200 -10,-200" transform="rotate(308.57)"/>
      <polygon points="0,-340 10,-200 -10,-200" transform="rotate(325.71)"/>
      <polygon points="0,-340 10,-200 -10,-200" transform="rotate(342.86)"/>
    </g>
  </g>

  <!-- Main location pin with shadow -->
  <g filter="url(#dropShadowA)">
    <path d="M512 120 C378 120 268 230 268 364 C268 530 512 760 512 760 C512 760 756 530 756 364 C756 230 646 120 512 120 Z" 
          fill="url(#pinGradA)"/>
    <!-- Pin highlight -->
    <path d="M512 140 C390 140 290 240 290 364 C290 430 340 520 400 610" 
          fill="none" stroke="#6EE7B7" stroke-width="10" stroke-linecap="round" opacity="0.25"/>
  </g>

  <!-- Golden sun circle inside pin -->
  <circle cx="512" cy="368" r="140" fill="url(#sunBodyA)" opacity="0.95"/>
  
  <!-- Inner ring -->
  <circle cx="512" cy="368" r="110" fill="none" stroke="#FDE68A" stroke-width="2.5" opacity="0.45"/>

  <!-- 21 sun rays inside the circle -->
  <g transform="translate(512, 368)" opacity="0.55">
    <g fill="#D97706">
      <polygon points="0,-135 5,-113 -5,-113" transform="rotate(0)"/>
      <polygon points="0,-135 5,-113 -5,-113" transform="rotate(17.14)"/>
      <polygon points="0,-135 5,-113 -5,-113" transform="rotate(34.28)"/>
      <polygon points="0,-135 5,-113 -5,-113" transform="rotate(51.43)"/>
      <polygon points="0,-135 5,-113 -5,-113" transform="rotate(68.57)"/>
      <polygon points="0,-135 5,-113 -5,-113" transform="rotate(85.71)"/>
      <polygon points="0,-135 5,-113 -5,-113" transform="rotate(102.86)"/>
      <polygon points="0,-135 5,-113 -5,-113" transform="rotate(120)"/>
      <polygon points="0,-135 5,-113 -5,-113" transform="rotate(137.14)"/>
      <polygon points="0,-135 5,-113 -5,-113" transform="rotate(154.28)"/>
      <polygon points="0,-135 5,-113 -5,-113" transform="rotate(171.43)"/>
      <polygon points="0,-135 5,-113 -5,-113" transform="rotate(188.57)"/>
      <polygon points="0,-135 5,-113 -5,-113" transform="rotate(205.71)"/>
      <polygon points="0,-135 5,-113 -5,-113" transform="rotate(222.86)"/>
      <polygon points="0,-135 5,-113 -5,-113" transform="rotate(240)"/>
      <polygon points="0,-135 5,-113 -5,-113" transform="rotate(257.14)"/>
      <polygon points="0,-135 5,-113 -5,-113" transform="rotate(274.28)"/>
      <polygon points="0,-135 5,-113 -5,-113" transform="rotate(291.43)"/>
      <polygon points="0,-135 5,-113 -5,-113" transform="rotate(308.57)"/>
      <polygon points="0,-135 5,-113 -5,-113" transform="rotate(325.71)"/>
      <polygon points="0,-135 5,-113 -5,-113" transform="rotate(342.86)"/>
    </g>
  </g>

  <!-- Stylized "K" letter in the sun center -->
  <g transform="translate(512, 368)">
    <g fill="none" stroke="#064E3B" stroke-width="16" stroke-linecap="round" stroke-linejoin="round">
      <line x1="-26" y1="-50" x2="-26" y2="50"/>
      <line x1="-26" y1="0" x2="26" y2="-50"/>
      <line x1="-26" y1="0" x2="26" y2="50"/>
    </g>
  </g>
</svg>
