<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- Background gradient: deep charcoal to dark emerald (subtle black→green) -->
    <radialGradient id="bgGrad" cx="50%" cy="45%" r="55%" fx="50%" fy="40%">
      <stop offset="0%" stop-color="#065F46"/>
      <stop offset="55%" stop-color="#064E3B"/>
      <stop offset="100%" stop-color="#1B2A3A"/>
    </radialGradient>

    <!-- Sun glow: golden radiance -->
    <radialGradient id="sunGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FBBF24" stop-opacity="0.35"/>
      <stop offset="60%" stop-color="#F59E0B" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#F59E0B" stop-opacity="0"/>
    </radialGradient>

    <!-- Sun body gradient -->
    <radialGradient id="sunBody" cx="45%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#FDE68A"/>
      <stop offset="40%" stop-color="#FBBF24"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </radialGradient>

    <!-- Pin gradient: emerald -->
    <linearGradient id="pinGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34D399"/>
      <stop offset="50%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>

    <!-- Pin inner shadow -->
    <radialGradient id="pinInner" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#6EE7B7"/>
      <stop offset="100%" stop-color="#10B981"/>
    </radialGradient>

    <!-- Warm accent gradient (red→amber — shared color) -->
    <linearGradient id="warmAccent" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FBBF24"/>
      <stop offset="100%" stop-color="#F97316"/>
    </linearGradient>

    <!-- Shadow filter -->
    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="18" flood-color="#000000" flood-opacity="0.35"/>
    </filter>

    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="12"/>
    </filter>

    <filter id="innerShadow">
      <feOffset dx="0" dy="3"/>
      <feGaussianBlur stdDeviation="4"/>
      <feComposite operator="out" in="SourceGraphic"/>
      <feFlood flood-color="#064E3B" flood-opacity="0.3"/>
      <feComposite operator="in" in2="A"/>
      <feComposite operator="over" in2="SourceGraphic"/>
    </filter>

    <!-- Clip for rounded square -->
    <clipPath id="roundedSquare">
      <rect x="0" y="0" width="1024" height="1024" rx="224" ry="224"/>
    </clipPath>
  </defs>

  <!-- Rounded square background -->
  <g clip-path="url(#roundedSquare)">
    <!-- Deep dark background -->
    <rect width="1024" height="1024" fill="url(#bgGrad)"/>

    <!-- Subtle texture: very faint grid lines like a map -->
    <g opacity="0.04" stroke="#FFFFFF" stroke-width="1">
      <line x1="0" y1="170" x2="1024" y2="170"/>
      <line x1="0" y1="340" x2="1024" y2="340"/>
      <line x1="0" y1="510" x2="1024" y2="510"/>
      <line x1="0" y1="680" x2="1024" y2="680"/>
      <line x1="0" y1="850" x2="1024" y2="850"/>
      <line x1="170" y1="0" x2="170" y2="1024"/>
      <line x1="340" y1="0" x2="340" y2="1024"/>
      <line x1="510" y1="0" x2="510" y2="1024"/>
      <line x1="680" y1="0" x2="680" y2="1024"/>
      <line x1="850" y1="0" x2="850" y2="1024"/>
    </g>

    <!-- Sun glow behind everything -->
    <circle cx="512" cy="380" r="320" fill="url(#sunGlow)"/>

    <!-- Sun rays — 21 rays like the Kurdish sun, radiating elegantly -->
    <g transform="translate(512, 380)" opacity="0.22">
      <!-- 21 rays -->
      <g fill="#FBBF24">
        <polygon points="0,-260 8,-150 -8,-150" transform="rotate(0)"/>
        <polygon points="0,-260 8,-150 -8,-150" transform="rotate(17.14)"/>
        <polygon points="0,-260 8,-150 -8,-150" transform="rotate(34.28)"/>
        <polygon points="0,-260 8,-150 -8,-150" transform="rotate(51.43)"/>
        <polygon points="0,-260 8,-150 -8,-150" transform="rotate(68.57)"/>
        <polygon points="0,-260 8,-150 -8,-150" transform="rotate(85.71)"/>
        <polygon points="0,-260 8,-150 -8,-150" transform="rotate(102.86)"/>
        <polygon points="0,-260 8,-150 -8,-150" transform="rotate(120)"/>
        <polygon points="0,-260 8,-150 -8,-150" transform="rotate(137.14)"/>
        <polygon points="0,-260 8,-150 -8,-150" transform="rotate(154.28)"/>
        <polygon points="0,-260 8,-150 -8,-150" transform="rotate(171.43)"/>
        <polygon points="0,-260 8,-150 -8,-150" transform="rotate(188.57)"/>
        <polygon points="0,-260 8,-150 -8,-150" transform="rotate(205.71)"/>
        <polygon points="0,-260 8,-150 -8,-150" transform="rotate(222.86)"/>
        <polygon points="0,-260 8,-150 -8,-150" transform="rotate(240)"/>
        <polygon points="0,-260 8,-150 -8,-150" transform="rotate(257.14)"/>
        <polygon points="0,-260 8,-150 -8,-150" transform="rotate(274.28)"/>
        <polygon points="0,-260 8,-150 -8,-150" transform="rotate(291.43)"/>
        <polygon points="0,-260 8,-150 -8,-150" transform="rotate(308.57)"/>
        <polygon points="0,-260 8,-150 -8,-150" transform="rotate(325.71)"/>
        <polygon points="0,-260 8,-150 -8,-150" transform="rotate(342.86)"/>
      </g>
    </g>

    <!-- Decorative ring — like a compass or golden ring -->
    <circle cx="512" cy="380" r="180" fill="none" stroke="#FBBF24" stroke-width="2" opacity="0.15"/>
    <circle cx="512" cy="380" r="220" fill="none" stroke="#FBBF24" stroke-width="1" opacity="0.08"/>

    <!-- Main location pin — large, centered, with shadow -->
    <g filter="url(#dropShadow)">
      <!-- Pin body -->
      <path d="M512 160 C400 160 310 250 310 362 C310 500 512 700 512 700 C512 700 714 500 714 362 C714 250 624 160 512 160 Z" 
            fill="url(#pinGrad)"/>
      
      <!-- Pin highlight (left side light reflection) -->
      <path d="M512 175 C410 175 328 257 328 362 C328 420 370 495 420 570" 
            fill="none" stroke="#6EE7B7" stroke-width="8" stroke-linecap="round" opacity="0.3"/>
    </g>

    <!-- Sun circle inside pin — the golden sun -->
    <circle cx="512" cy="365" r="120" fill="url(#sunBody)" opacity="0.95"/>
    
    <!-- Inner sun detail: faint ring -->
    <circle cx="512" cy="365" r="95" fill="none" stroke="#FDE68A" stroke-width="2" opacity="0.5"/>

    <!-- Sun rays inside the pin (21 small rays) -->
    <g transform="translate(512, 365)" opacity="0.6">
      <g fill="#F59E0B">
        <polygon points="0,-115 4,-98 -4,-98" transform="rotate(0)"/>
        <polygon points="0,-115 4,-98 -4,-98" transform="rotate(17.14)"/>
        <polygon points="0,-115 4,-98 -4,-98" transform="rotate(34.28)"/>
        <polygon points="0,-115 4,-98 -4,-98" transform="rotate(51.43)"/>
        <polygon points="0,-115 4,-98 -4,-98" transform="rotate(68.57)"/>
        <polygon points="0,-115 4,-98 -4,-98" transform="rotate(85.71)"/>
        <polygon points="0,-115 4,-98 -4,-98" transform="rotate(102.86)"/>
        <polygon points="0,-115 4,-98 -4,-98" transform="rotate(120)"/>
        <polygon points="0,-115 4,-98 -4,-98" transform="rotate(137.14)"/>
        <polygon points="0,-115 4,-98 -4,-98" transform="rotate(154.28)"/>
        <polygon points="0,-115 4,-98 -4,-98" transform="rotate(171.43)"/>
        <polygon points="0,-115 4,-98 -4,-98" transform="rotate(188.57)"/>
        <polygon points="0,-115 4,-98 -4,-98" transform="rotate(205.71)"/>
        <polygon points="0,-115 4,-98 -4,-98" transform="rotate(222.86)"/>
        <polygon points="0,-115 4,-98 -4,-98" transform="rotate(240)"/>
        <polygon points="0,-115 4,-98 -4,-98" transform="rotate(257.14)"/>
        <polygon points="0,-115 4,-98 -4,-98" transform="rotate(274.28)"/>
        <polygon points="0,-115 4,-98 -4,-98" transform="rotate(291.43)"/>
        <polygon points="0,-115 4,-98 -4,-98" transform="rotate(308.57)"/>
        <polygon points="0,-115 4,-98 -4,-98" transform="rotate(325.71)"/>
        <polygon points="0,-115 4,-98 -4,-98" transform="rotate(342.86)"/>
      </g>
    </g>

    <!-- Stylized "K" letter in the sun center -->
    <g transform="translate(512, 365)">
      <!-- K made of elegant strokes -->
      <g fill="none" stroke="#064E3B" stroke-width="14" stroke-linecap="round" stroke-linejoin="round">
        <!-- Vertical bar of K -->
        <line x1="-22" y1="-42" x2="-22" y2="42"/>
        <!-- Upper diagonal of K -->
        <line x1="-22" y1="0" x2="22" y2="-42"/>
        <!-- Lower diagonal of K -->
        <line x1="-22" y1="0" x2="22" y2="42"/>
      </g>
    </g>

    <!-- "KurdMap" text at bottom -->
    <text x="512" y="830" text-anchor="middle" 
          font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" 
          font-weight="700" font-size="96" fill="#FFFFFF" letter-spacing="6" opacity="0.95">
      Kurd<tspan fill="#FBBF24">Map</tspan>
    </text>

    <!-- Subtle tagline -->
    <text x="512" y="890" text-anchor="middle" 
          font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" 
          font-weight="400" font-size="36" fill="#A7F3D0" letter-spacing="4" opacity="0.55">
      DISCOVER LOCAL
    </text>

    <!-- Very subtle tri-color accent bar at very bottom (German flag inspired, very abstract) -->
    <g opacity="0.12">
      <rect x="362" y="940" width="100" height="4" rx="2" fill="#374151"/>
      <rect x="462" y="940" width="100" height="4" rx="2" fill="#DC2626"/>
      <rect x="562" y="940" width="100" height="4" rx="2" fill="#FBBF24"/>
    </g>
  </g>
</svg>
