<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0c1929"/>
      <stop offset="40%" stop-color="#0f2a3e"/>
      <stop offset="100%" stop-color="#0a3040"/>
    </linearGradient>
    <radialGradient id="aura" cx="50%" cy="40%" r="45%">
      <stop offset="0%" stop-color="#FFD700" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#FFD700" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="pin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#34D399"/>
      <stop offset="50%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <filter id="s">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <filter id="g">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <circle cx="256" cy="220" r="200" fill="url(#aura)"/>

  <!-- Map Pin -->
  <g filter="url(#s)" transform="translate(256, 230)">
    <path d="M0-145 C-66-145 -120-90 -120-36 C-120 36 0 120 0 120 C0 120 120 36 120-36 C120-90 66-145 0-145Z"
          fill="url(#pin)"/>
    <path d="M-5-135 C-54-135 -102-85 -102-36 C-102-85 -54-135 -5-135Z"
          fill="white" opacity="0.12"/>
    <circle cx="0" cy="-42" r="46" fill="#0c1929" opacity="0.9"/>

    <!-- Sun compass -->
    <g transform="translate(0, -42)" filter="url(#g)">
      <circle cx="0" cy="0" r="26" fill="#FFD700" opacity="0.9"/>
      <g stroke="#FFD700" stroke-width="3" stroke-linecap="round" opacity="0.85">
        <line x1="0" y1="-30" x2="0" y2="-38"/>
        <line x1="22" y1="-22" x2="28" y2="-28"/>
        <line x1="30" y1="0" x2="38" y2="0"/>
        <line x1="22" y1="22" x2="28" y2="28"/>
        <line x1="0" y1="30" x2="0" y2="38"/>
        <line x1="-22" y1="22" x2="-28" y2="28"/>
        <line x1="-30" y1="0" x2="-38" y2="0"/>
        <line x1="-22" y1="-22" x2="-28" y2="-28"/>
      </g>
      <g stroke="#FFD700" stroke-width="2" stroke-linecap="round" opacity="0.4">
        <line x1="12" y1="-27" x2="15" y2="-34"/>
        <line x1="27" y1="-12" x2="34" y2="-15"/>
        <line x1="27" y1="12" x2="34" y2="15"/>
        <line x1="12" y1="27" x2="15" y2="34"/>
        <line x1="-12" y1="27" x2="-15" y2="34"/>
        <line x1="-27" y1="12" x2="-34" y2="15"/>
        <line x1="-27" y1="-12" x2="-34" y2="-15"/>
        <line x1="-12" y1="-27" x2="-15" y2="-34"/>
      </g>
      <circle cx="0" cy="0" r="12" fill="#F59E0B" opacity="0.5"/>
      <circle cx="0" cy="0" r="6" fill="#FBBF24" opacity="0.7"/>
    </g>
  </g>

  <!-- KURDMAP text -->
  <text x="256" y="430" text-anchor="middle" font-family="'Segoe UI', 'SF Pro Display', Arial, sans-serif"
        font-size="52" font-weight="900" fill="white" letter-spacing="5" opacity="0.95">
    KURDMAP
  </text>

  <!-- German tricolor accent -->
  <g opacity="0.12">
    <rect x="168" y="452" width="176" height="2" rx="1" fill="#333"/>
    <rect x="178" y="458" width="156" height="2" rx="1" fill="#D4372C"/>
    <rect x="188" y="464" width="136" height="2" rx="1" fill="#FFB829"/>
  </g>
</svg>
