<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Gradient: German flag colors as subtle warm tones -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="50%" stop-color="#16213e"/>
      <stop offset="100%" stop-color="#0f3460"/>
    </linearGradient>

    <!-- Sun glow (Kurdish flag sun — golden rays) -->
    <radialGradient id="sunGlow" cx="50%" cy="42%" r="35%">
      <stop offset="0%" stop-color="#FFD700" stop-opacity="0.25"/>
      <stop offset="60%" stop-color="#FFD700" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#FFD700" stop-opacity="0"/>
    </radialGradient>

    <!-- Map pin gradient: emerald (Kurdish green) with gold (German gold) accent -->
    <linearGradient id="pinGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#10B981"/>
      <stop offset="70%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>

    <!-- Ring gradient: German black-red-gold as elegant tones -->
    <linearGradient id="ringGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2d2d2d"/>
      <stop offset="35%" stop-color="#c1272d"/>
      <stop offset="100%" stop-color="#FFB829"/>
    </linearGradient>

    <!-- Text gradient -->
    <linearGradient id="textGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#FFD700"/>
    </linearGradient>

    <!-- Shadow filter -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>

    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="url(#bgGrad)"/>

  <!-- Subtle sun rays radiating from center (Kurdish flag sun rays — hidden as decorative element) -->
  <circle cx="256" cy="215" r="180" fill="url(#sunGlow)"/>

  <!-- 21 subtle sun rays (Kurdish sun has 21 rays) as decorative lines -->
  <g opacity="0.08" stroke="#FFD700" stroke-width="1.5" fill="none">
    <line x1="256" y1="215" x2="256" y2="55" />
    <line x1="256" y1="215" x2="310" y2="60" />
    <line x1="256" y1="215" x2="358" y2="80" />
    <line x1="256" y1="215" x2="396" y2="115" />
    <line x1="256" y1="215" x2="420" y2="160" />
    <line x1="256" y1="215" x2="430" y2="215" />
    <line x1="256" y1="215" x2="420" y2="270" />
    <line x1="256" y1="215" x2="396" y2="315" />
    <line x1="256" y1="215" x2="358" y2="350" />
    <line x1="256" y1="215" x2="310" y2="370" />
    <line x1="256" y1="215" x2="256" y2="375" />
    <line x1="256" y1="215" x2="202" y2="370" />
    <line x1="256" y1="215" x2="154" y2="350" />
    <line x1="256" y1="215" x2="116" y2="315" />
    <line x1="256" y1="215" x2="92" y2="270" />
    <line x1="256" y1="215" x2="82" y2="215" />
    <line x1="256" y1="215" x2="92" y2="160" />
    <line x1="256" y1="215" x2="116" y2="115" />
    <line x1="256" y1="215" x2="154" y2="80" />
    <line x1="256" y1="215" x2="202" y2="60" />
    <line x1="256" y1="215" x2="228" y2="57" />
  </g>

  <!-- Outer decorative ring (German tricolor as elegant ring) -->
  <circle cx="256" cy="256" r="220" fill="none" stroke="url(#ringGrad)" stroke-width="3" opacity="0.2"/>

  <!-- Inner circle (soft border) -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="#10B981" stroke-width="1" opacity="0.15"/>

  <!-- Map Pin Shape — main icon -->
  <g filter="url(#shadow)" transform="translate(256, 220)">
    <!-- Pin body -->
    <path d="M0-120 C-55-120 -100-75 -100-30 C-100 30 0 100 0 100 C0 100 100 30 100-30 C100-75 55-120 0-120Z"
          fill="url(#pinGrad)" opacity="0.95"/>

    <!-- Pin highlight (glass effect) -->
    <path d="M0-110 C-45-110 -82-70 -82-30 C-82-70 -45-110 0-110Z"
          fill="white" opacity="0.15"/>

    <!-- Inner circle in pin (represents Kurdish sun disc) -->
    <circle cx="0" cy="-35" r="38" fill="#0f3460" opacity="0.9"/>

    <!-- Golden sun in center (Kurdish sun — 21-ray star simplified to elegant compass) -->
    <g transform="translate(0, -35)" filter="url(#glow)">
      <!-- Sun disc -->
      <circle cx="0" cy="0" r="22" fill="#FFD700" opacity="0.9"/>

      <!-- 8 main rays (elegant compass-style, evocative of sun without being obvious flag) -->
      <g stroke="#FFD700" stroke-width="2.5" stroke-linecap="round" opacity="0.85">
        <line x1="0" y1="-25" x2="0" y2="-32"/>
        <line x1="18" y1="-18" x2="23" y2="-23"/>
        <line x1="25" y1="0" x2="32" y2="0"/>
        <line x1="18" y1="18" x2="23" y2="23"/>
        <line x1="0" y1="25" x2="0" y2="32"/>
        <line x1="-18" y1="18" x2="-23" y2="23"/>
        <line x1="-25" y1="0" x2="-32" y2="0"/>
        <line x1="-18" y1="-18" x2="-23" y2="-23"/>
      </g>

      <!-- 8 secondary rays (shorter) -->
      <g stroke="#FFD700" stroke-width="1.5" stroke-linecap="round" opacity="0.5">
        <line x1="10" y1="-23" x2="13" y2="-29"/>
        <line x1="23" y1="-10" x2="29" y2="-13"/>
        <line x1="23" y1="10" x2="29" y2="13"/>
        <line x1="10" y1="23" x2="13" y2="29"/>
        <line x1="-10" y1="23" x2="-13" y2="29"/>
        <line x1="-23" y1="10" x2="-29" y2="13"/>
        <line x1="-23" y1="-10" x2="-29" y2="-13"/>
        <line x1="-10" y1="-23" x2="-13" y2="-29"/>
      </g>

      <!-- Inner sun circle -->
      <circle cx="0" cy="0" r="10" fill="#FFA500" opacity="0.6"/>
      <circle cx="0" cy="0" r="5" fill="#FFD700" opacity="0.8"/>
    </g>
  </g>

  <!-- "K" letter stylized (bottom) -->
  <text x="256" y="380" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="48" font-weight="900" fill="url(#textGrad)" letter-spacing="4" opacity="0.9">
    KURDMAP
  </text>

  <!-- Subtle tagline -->
  <text x="256" y="410" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="14" fill="#94a3b8" letter-spacing="6" opacity="0.6">
    BUSINESS DIRECTORY
  </text>

  <!-- Three subtle horizontal stripes at bottom (German flag abstracted) -->
  <g opacity="0.12">
    <rect x="180" y="435" width="152" height="2" rx="1" fill="#2d2d2d"/>
    <rect x="190" y="441" width="132" height="2" rx="1" fill="#c1272d"/>
    <rect x="200" y="447" width="112" height="2" rx="1" fill="#FFB829"/>
  </g>
</svg>
