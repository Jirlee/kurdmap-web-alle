name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Build & Test ──
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore & Build
        run: dotnet build KurdMap.slnx --configuration Release

      - name: Run Tests
        run: dotnet test KurdMap.slnx --configuration Release --no-build --verbosity normal

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Admin - Install & Test & Build
        working-directory: src/kurdmap-admin
        run: |
          npm ci
          npx ng test
          npx ng build

      - name: Frontend - Install & Build
        working-directory: src/kurdmap-frontend
        run: |
          npm ci
          npx ng build

  # ── Security Scan ──
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - uses: actions/checkout@v4

      - name: Lowercase owner
        id: lower
        run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Build images for scanning
        run: |
          docker build -f docker/api.Dockerfile -t ${{ steps.lower.outputs.owner }}/kurdmap-api:scan .
          docker build -f docker/admin.Dockerfile -t ${{ steps.lower.outputs.owner }}/kurdmap-admin:scan .
          docker build -f docker/frontend.Dockerfile -t ${{ steps.lower.outputs.owner }}/kurdmap-frontend:scan .

      - name: Install Trivy
        run: |
          sudo apt-get install wget apt-transport-https gnupg -y
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | gpg --dearmor | sudo tee /usr/share/keyrings/trivy.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb generic main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update && sudo apt-get install trivy -y

      - name: Scan images
        run: |
          trivy image --severity HIGH,CRITICAL --exit-code 0 ${{ steps.lower.outputs.owner }}/kurdmap-api:scan
          trivy image --severity HIGH,CRITICAL --exit-code 0 ${{ steps.lower.outputs.owner }}/kurdmap-admin:scan
          trivy image --severity HIGH,CRITICAL --exit-code 0 ${{ steps.lower.outputs.owner }}/kurdmap-frontend:scan

  # ── Build & Push Container Images ──
  push-images:
    name: Push Images
    runs-on: ubuntu-latest
    needs: [build-and-test, security-scan]
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - dockerfile: docker/api.Dockerfile
            image: kurdmap-api
          - dockerfile: docker/admin.Dockerfile
            image: kurdmap-admin
          - dockerfile: docker/frontend.Dockerfile
            image: kurdmap-frontend

    steps:
      - uses: actions/checkout@v4

      - name: Lowercase owner
        id: lower
        run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ghcr.io/${{ steps.lower.outputs.owner }}/${{ matrix.image }}:latest
            ghcr.io/${{ steps.lower.outputs.owner }}/${{ matrix.image }}:${{ github.sha }}

  # ── Deploy to Rocky Linux Server (Podman) ──
  # Best practice: NO git, NO source code on server.
  # CI/CD copies only deployment files via SCP, then pulls images from GHCR.
  # Server only needs: compose files, .env, Caddyfile, backup.sh
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: push-images
    environment: production

    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            docker-compose.yml
            docker-compose.prod.yml
            docker/Caddyfile
            docker/backup.sh
            docker/seed-data.sql
            .env.example

      - name: Create target directory on server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          script: mkdir -p ${{ secrets.DEPLOY_PATH }}/docker

      - name: Copy deployment files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          source: "docker-compose.yml,docker-compose.prod.yml,docker/Caddyfile,docker/backup.sh,docker/seed-data.sql,.env.example"
          target: ${{ secrets.DEPLOY_PATH }}
          overwrite: true

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          command_timeout: 30m
          script: |
            set -e
            DEPLOY_DIR="${{ secrets.DEPLOY_PATH }}"
            cd "$DEPLOY_DIR"

            # First deploy: .env must be created manually
            if [ ! -f .env ]; then
              echo "❌ .env file not found!"
              echo "First deploy? Run on server:"
              echo "  cp .env.example .env && nano .env"
              exit 1
            fi

            # Ensure GHCR_USERNAME is in .env (needed by compose for image names)
            if ! grep -q "^GHCR_USERNAME=" .env; then
              echo "GHCR_USERNAME=${{ secrets.GHCR_USERNAME }}" >> .env
            fi

            # Ensure backup script is executable
            chmod +x docker/backup.sh

            # Login to GHCR
            echo "${{ secrets.GHCR_TOKEN }}" | podman login ghcr.io -u ${{ secrets.GHCR_USERNAME }} --password-stdin

            # Pull images
            echo "⬇️ Pulling images..."
            podman pull ghcr.io/${{ secrets.GHCR_USERNAME }}/kurdmap-api:latest
            podman pull ghcr.io/${{ secrets.GHCR_USERNAME }}/kurdmap-admin:latest
            podman pull ghcr.io/${{ secrets.GHCR_USERNAME }}/kurdmap-frontend:latest

            # Start services (--no-build: images are pre-built, no Dockerfiles on server)
            echo "🚀 Starting services..."
            podman compose -f docker-compose.yml -f docker-compose.prod.yml down --remove-orphans 2>/dev/null || true
            podman compose -f docker-compose.yml -f docker-compose.prod.yml up -d --no-build

            # Reload host Caddy to pick up any Caddyfile changes
            sudo systemctl reload caddy

            # Wait and check
            sleep 10
            podman compose -f docker-compose.yml -f docker-compose.prod.yml ps

            # Health check
            curl -f http://localhost:8080/health || exit 1

            # Cleanup old images
            podman image prune -f || true

            echo "✅ Deployment successful!"
